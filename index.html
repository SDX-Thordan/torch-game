<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#05080f" />
    <title>TORCH</title>
    <link rel="stylesheet" href="/app/style.css" />
  </head>
  <body>
    <div id="app">
      <header id="topbar">
        <span id="title">TORCH</span>
        <span id="clock">T+0d</span>
        <span id="speed-controls">
          <button data-speed="0">‖</button>
          <button data-speed="1" class="active">1×</button>
          <button data-speed="6">6×</button>
          <button data-speed="24">24×</button>
        </span>
      </header>
      <canvas id="orrery"></canvas>
      <section id="panel">
        <h2>Markets — settled prices</h2>
        <div id="markets"></div>
        <h2>Transfer · Earth → Ceres</h2>
        <div id="transfer"></div>
      </section>
    </div>
    <script type="module" src="/app/main.ts"></script>
  </body>
</html>
