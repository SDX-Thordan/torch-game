name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  core:
    name: Rust core — fmt, clippy, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show && rustup component add rustfmt clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --all

  gut:
    name: Godot — GUT view/integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 40
    # Community image with Godot 4.6.3 headless; we add Rust to build the gdext
    # core the tests load (the sim↔view binding contract, §32).
    container:
      image: barichello/godot-ci:4.6.3
    # gdext's generated bindings make debuginfo enormous and memory-heavy — on a
    # 2-core runner a full debug build thrashes for 30+ min. We don't need debug
    # symbols to run GUT, so drop them: the cold build comes down to a few minutes.
    env:
      CARGO_PROFILE_DEV_DEBUG: "0"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          apt-get update && apt-get install -y --no-install-recommends build-essential curl
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: Swatinem/rust-cache@v2

      - name: Build the gdext core (debug cdylib the extension loads)
        run: cargo build -p torch-core

      # Godot can hang headless if it grabs a display/audio device — force the dummy
      # drivers, and timeout each step so a hang fails fast (observable) instead of
      # burning the whole job.
      - name: Import project (registers the gdextension + GUT class_names)
        run: timeout 360 godot --headless --audio-driver Dummy --display-driver headless --path godot --import || true

      - name: Run GUT
        run: timeout 360 godot --headless --audio-driver Dummy --display-driver headless --path godot -s addons/gut/gut_cmdln.gd -gdir=res://test -gexit
