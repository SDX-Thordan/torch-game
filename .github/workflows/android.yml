name: Android APK

on:
  workflow_dispatch: {}
  push:
    branches: [feat/android-apk] # TEMP: remove before merge; iterate in CI here
    tags: ["v*"]

permissions:
  contents: write

env:
  # Engine is Godot 4.6.3. gdext 0.2.4 targets the 4.3 GDExtension API and runs
  # forward-compatibly on any newer 4.x engine (compatibility_minimum = 4.3).
  GODOT_REL: 4.6.3-stable
  GODOT_TPL_DIR: 4.6.3.stable
  NDK_VERSION: 23.2.8568313

jobs:
  apk:
    name: Build debug APK (Godot + Rust on Android)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages (platform, build-tools, NDK)
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0" "ndk;${NDK_VERSION}" "cmake;3.22.1"

      - name: Install Rust + Android target
        run: |
          rustup target add aarch64-linux-android
          cargo install cargo-ndk --locked

      - uses: Swatinem/rust-cache@v2

      - name: Cross-compile Rust core for arm64
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_VERSION }}
        run: |
          cargo ndk -t arm64-v8a build --release -p torch-core
          mkdir -p godot/bin/android/arm64
          cp target/aarch64-linux-android/release/libtorch_core.so godot/bin/android/arm64/libtorch_core.so
          ls -l godot/bin/android/arm64/

      - name: Build Rust core for host (editor loads it during export)
        run: cargo build -p torch-core # -> target/debug/libtorch_core.so for linux.x86_64

      - name: Download Godot headless editor + export templates
        run: |
          BASE="https://github.com/godotengine/godot/releases/download/${GODOT_REL}"
          curl -sSL -o godot.zip "${BASE}/Godot_v${GODOT_REL}_linux.x86_64.zip"
          curl -sSL -o templates.tpz "${BASE}/Godot_v${GODOT_REL}_export_templates.tpz"
          unzip -q godot.zip
          chmod +x Godot_v${GODOT_REL}_linux.x86_64
          sudo mv Godot_v${GODOT_REL}_linux.x86_64 /usr/local/bin/godot
          # Install export templates.
          mkdir -p "$HOME/.local/share/godot/export_templates/${GODOT_TPL_DIR}"
          unzip -q templates.tpz -d tpl
          cp -r tpl/templates/* "$HOME/.local/share/godot/export_templates/${GODOT_TPL_DIR}/"

      - name: Generate debug keystore (referenced by the export preset)
        run: |
          keytool -genkeypair -v -keystore godot/debug.keystore \
            -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Install Android build template (gradle source)
        # GDExtension on Android requires the gradle/custom build so the native
        # .so is packaged into the APK; the standard prebuilt template can't.
        run: |
          mkdir -p godot/android/build
          unzip -q "$HOME/.local/share/godot/export_templates/${GODOT_TPL_DIR}/android_source.zip" -d godot/android/build
          echo "${GODOT_TPL_DIR}" > godot/android/.build_version
          touch godot/android/build/.gdignore

      - name: Import project (generates .godot + resource imports)
        run: godot --headless --path godot --import || true

      - name: Configure Godot editor settings (SDK + JDK)
        # Written AFTER import so the import run can't clobber these values; the
        # debug keystore comes from the export preset, not here.
        run: |
          mkdir -p "$HOME/.config/godot"
          for f in editor_settings-4.tres editor_settings-4.3.tres; do
            cat > "$HOME/.config/godot/$f" <<EOF
          [gd_resource type="EditorSettings" format=3]
          [resource]
          export/android/android_sdk_path = "${ANDROID_SDK_ROOT}"
          export/android/java_sdk_path = "${JAVA_HOME}"
          EOF
          done

      - name: Export debug APK
        run: |
          mkdir -p build
          echo "--- sdk ---"; ls "$ANDROID_SDK_ROOT/build-tools" || true
          echo "--- staged android lib ---"; ls -l godot/bin/android/arm64/ || true
          echo "--- keystore ---"; ls -l godot/debug.keystore || true
          godot --headless --path godot --export-debug "Android" "${GITHUB_WORKSPACE}/build/torch.apk" --verbose

      - name: Verify APK exists (the real build gate)
        run: |
          test -f build/torch.apk
          ls -lh build/torch.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        continue-on-error: true # account artifact storage quota must not fail the build
        with:
          name: torch-debug-apk
          path: build/torch.apk
          retention-days: 5
          if-no-files-found: error

      - name: Attach APK to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/torch.apk
