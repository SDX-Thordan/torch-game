name: Android APK

on:
  workflow_dispatch: {}
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  apk:
    name: Build debug APK (Godot + Rust on Android)
    runs-on: ubuntu-latest
    # Community-maintained image: Godot 4.6.3 + export templates + Android SDK/JDK
    # with a known-good headless Android export setup.
    container:
      image: barichello/godot-ci:4.6.3
    steps:
      - uses: actions/checkout@v4

      - name: Image diagnostics
        run: |
          echo "godot: $(godot --version 2>/dev/null || godot --headless --version)"
          echo "HOME=$HOME ANDROID_HOME=$ANDROID_HOME ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT JAVA_HOME=$JAVA_HOME"
          echo "--- export templates ---"; ls ~/.local/share/godot/export_templates/ 2>/dev/null || true
          SDK="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/root/Android/Sdk}}"
          echo "--- sdk ($SDK) ---"; ls "$SDK" 2>/dev/null || true
          echo "--- existing editor settings ---"; ls ~/.config/godot/ 2>/dev/null || true

      - name: Install Rust + cargo-ndk
        run: |
          apt-get update && apt-get install -y --no-install-recommends build-essential curl
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          . "$HOME/.cargo/env"
          rustup target add aarch64-linux-android
          cargo install cargo-ndk --locked

      - name: Ensure Android SDK packages (NDK + build-tools matching target SDK)
        run: |
          SDK="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
          if [ -z "$SDK" ] || [ ! -d "$SDK/platform-tools" ]; then
            SDK="$(dirname "$(dirname "$(find / -type d -name platform-tools -path '*android*' 2>/dev/null | head -1)")")"
          fi
          SDKMANAGER="$(find "$SDK" -name sdkmanager -path '*cmdline-tools*' 2>/dev/null | head -1)"
          echo "SDK=$SDK sdkmanager=$SDKMANAGER"
          # Godot 4.6 rejects export if no build-tools match the target SDK (34);
          # the image ships only 33.0.2. Install platform + build-tools 34.
          yes | "$SDKMANAGER" --sdk_root="$SDK" --licenses || true
          "$SDKMANAGER" --sdk_root="$SDK" "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          test -x "$SDK/build-tools/34.0.0/apksigner" || { echo "build-tools 34 install failed"; exit 1; }
          NDK="$(ls -d "$SDK"/ndk/* 2>/dev/null | sort -V | tail -1 || true)"
          if [ -z "$NDK" ]; then
            "$SDKMANAGER" "ndk;23.2.8568313" >/dev/null 2>&1 || true
            NDK="$SDK/ndk/23.2.8568313"
          fi
          echo "Using NDK: $NDK"
          echo "ANDROID_NDK_HOME=$NDK" >> "$GITHUB_ENV"
          echo "--- build-tools now available ---"; ls "$SDK/build-tools" || true

      - name: Cross-compile Rust core for arm64 + host
        run: |
          . "$HOME/.cargo/env"
          cargo ndk -t arm64-v8a build --release -p torch-core
          mkdir -p godot/bin/android/arm64
          cp target/aarch64-linux-android/release/libtorch_core.so godot/bin/android/arm64/libtorch_core.so
          cargo build -p torch-core   # host lib the editor loads during export
          ls -l godot/bin/android/arm64/ target/debug/libtorch_core.so

      - name: Generate debug keystore (referenced by the export preset)
        run: |
          keytool -genkeypair -v -keystore godot/debug.keystore \
            -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Prepare Godot Android env (templates + editor settings)
        run: |
          SDK="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
          if [ -z "$SDK" ] || [ ! -d "$SDK/platform-tools" ]; then
            SDK="$(dirname "$(dirname "$(find / -type d -name platform-tools -path '*android*' 2>/dev/null | head -1)")")"
          fi
          JDK="${JAVA_HOME:-}"
          if [ -z "$JDK" ] || [ ! -x "$JDK/bin/java" ]; then
            JDK="$(dirname "$(dirname "$(readlink -f "$(command -v java)")")")"
          fi
          echo "Resolved SDK=$SDK JDK=$JDK"
          # The image ships export templates under root's data dir; Godot looks
          # under $HOME (=/github/home) here, so make them visible there.
          SRC="$(dirname "$(find / -name android_source.zip -path '*export_templates*' 2>/dev/null | head -1)")"
          echo "templates source: $SRC"
          mkdir -p "$HOME/.local/share/godot/export_templates/4.6.3.stable"
          cp -rn "$SRC/." "$HOME/.local/share/godot/export_templates/4.6.3.stable/" 2>/dev/null || true
          ls "$HOME/.local/share/godot/export_templates/4.6.3.stable/" | head
          # Editor settings — correct 4.6 filename, real SDK + JDK paths.
          mkdir -p "$HOME/.config/godot"
          cat > "$HOME/.config/godot/editor_settings-4.6.tres" <<EOF
          [gd_resource type="EditorSettings" format=3]
          [resource]
          export/android/android_sdk_path = "$SDK"
          export/android/java_sdk_path = "$JDK"
          EOF

      - name: Export debug APK (installs the gradle build template)
        run: |
          mkdir -p build
          godot --headless --path godot --install-android-build-template \
            --export-debug "Android" "$GITHUB_WORKSPACE/build/torch.apk"

      - name: Verify APK exists (the real build gate)
        run: |
          test -f build/torch.apk
          ls -lh build/torch.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        continue-on-error: true # artifact storage quota must not fail the build
        with:
          name: torch-debug-apk
          path: build/torch.apk
          retention-days: 5
          if-no-files-found: error

      - name: Attach APK to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/torch.apk
